  .progress-seg { height: 4px; flex: 1; border-radius: 2px; background: #ddd; }
  .progress-seg.done { background: #0F6E56; }
  .progress-seg.current { background: #1D9E75; }
  .q-meta { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #888; margin-bottom: 14px; }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.55; margin-bottom: 22px; }

  .gj-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .gj-nome { font-size: 28px; font-weight: 500; margin: 0 0 2px; }
  .gj-sub { font-size: 13px; opacity: .8; margin: 0; }

  .barra-row { margin-bottom: 9px; }
  .barra-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
  .barra-labels .area-name { font-weight: 500; }
  .barra-labels .area-val { color: #666; }
  .barra-track { height: 5px; background: #e5e5e5; border-radius: 3px; }
  .barra-fill { height: 100%; border-radius: 3px; }
  .testo-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 18px; }
  .testo-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #999; margin-bottom: 8px; }
  .testo-content { font-size: 13px; line-height: 1.75; color: #222; }

      { id:"codice",      area:"Codice",      t:"Sa leggere, interpretare e scrivere scritture in codice con sicurezza? Sa essere di supporto ai compagni?", frasi: FR_TEC.codice },

      { id:"copiadalvero", area:"Copia dal vero",     t:"Sa copiare dal vero oggetti, persone, animali o ambienti riproducendo gli elementi con accuratezza?", frasi: FR_ART.copiadalvero },
      { id:"osservazione", area:"Lettura immagini",   t:"Sa osservare, esplorare e descrivere le immagini d'arte cogliendone gli elementi formali (linee, colori, forme)?", frasi: FR_ART.osservazione_art },
    ],
  },
  motoria: {

      { id:"corpo",    area:"Corpo espressivo", t:"Sa esprimere stati d'animo e comunicare attraverso il corpo e il movimento?",                                           frasi: FR_MOT.corpo },
      { id:"regole",   area:"Regole e gioco",  t:"Accetta le proposte di gioco altrui e vi partecipa attivamente? Conosce le regole dei giochi proposti e le rispetta?",  frasi: FR_MOT.regole },
      { id:"salute",   area:"Salute",          t:"Dimostra di aver compreso la relazione tra alimentazione, esercizio fisico, igiene e salute nella vita quotidiana?",    frasi: FR_MOT.salute },
    ],
  },
  civica: {

      { id:"costituzione", area:"Costituzione",        t:"Conosce e applica i principi fondamentali della convivenza pacifica? Riconosce la necessità di regole condivise?", frasi: FR_CIV.costituzione },
      { id:"sostenibilita",area:"Sostenibilità",       t:"Conosce i principi di sicurezza e sostenibilità? Assume comportamenti corretti riguardo al cibo e allo smaltimento dei rifiuti?", frasi: FR_CIV.sostenibilita },

    2: [
      { id:"costituzione", area:"Costituzione",        t:"Conosce e applica i principi fondamentali della convivenza pacifica? Riconosce la necessità di regole condivise?", frasi: FR_CIV.costituzione },
      { id:"sostenibilita",area:"Sostenibilità",       t:"Conosce i principi di sicurezza e sostenibilità? Assume comportamenti corretti riguardo al cibo e allo smaltimento dei rifiuti?", frasi: FR_CIV.sostenibilita },
      { id:"digitale",     area:"Cittadinanza digitale", t:"Comprende il ruolo dei media digitali nella comunicazione e come strumento di conoscenza?",                    frasi: FR_CIV.digitale },
    ],
    3: [
      { id:"costituzione", area:"Costituzione",        t:"Conosce e applica i principi fondamentali della convivenza pacifica? Riconosce autonomamente la necessità di regole condivise?", frasi: FR_CIV.costituzione },
      { id:"sostenibilita",area:"Sostenibilità",       t:"Conosce e applica i principi di sostenibilità? Assume comportamenti corretti in modo autonomo riguardo al cibo e ai rifiuti?", frasi: FR_CIV.sostenibilita },

      { id:"costituzione", area:"Costituzione",        t:"Conosce e applica i principi fondamentali della convivenza pacifica? Conosce i documenti affrontati sui diritti umani?", frasi: FR_CIV.costituzione },

      { id:"digitale",     area:"Cittadinanza digitale", t:"Comprende il ruolo dei media digitali? Si avvia a riconoscerne, oltre alle opportunità, i rischi?",            frasi: FR_CIV.digitale },
    ],
    5: [
      { id:"costituzione", area:"Costituzione",        t:"Conosce e applica in modo consapevole i principi fondamentali della convivenza? Conosce in modo approfondito i documenti sui diritti umani?", frasi: FR_CIV.costituzione },
      { id:"sostenibilita",area:"Sostenibilità",       t:"Conosce e applica in modo consapevole i principi di sostenibilità? Apporta contributi personali e promuove la riflessione nel gruppo?", frasi: FR_CIV.sostenibilita },
      { id:"digitale",     area:"Cittadinanza digitale", t:"Comprende pienamente il ruolo dei media digitali e riconosce con sicurezza sia le opportunità che i rischi?",  frasi: FR_CIV.digitale },
    ],
  },
};

const MATERIE = [
  { id:"matematica", label:"Matematica" },
  { id:"italiano",   label:"Italiano" },
  { id:"inglese",    label:"Inglese" },
  { id:"geografia",  label:"Geografia" },
  { id:"storia",     label:"Storia" },
  { id:"scienze",    label:"Scienze" },
  { id:"motoria",    label:"Ed. Motoria" },
  { id:"tecnologia", label:"Tecnologia" },
  { id:"arte",       label:"Arte e Immagine" },
  { id:"civica",     label:"Ed. Civica" },
];

const OPZIONI = [
  { v:5, l:"Sì, sempre e con sicurezza" },
  { v:4, l:"Spesso, con buona autonomia" },
  { v:3, l:"A volte, con qualche incertezza" },
  { v:2, l:"Con guida e supporto" },
  { v:1, l:"Raramente o con grande difficoltà" },
];

// ─── STATO ───────────────────────────────────────────────────────────────────
let STATE = {
  step: "setup",
  materia: "", classe: "",
  alunni: [],
  nome: "", risposte: {}, dIdx: 0,
};

function getDom(mat, cl) {
  const dm = DOMANDE[mat];
  if (!dm) return [];
  if (dm.all) return dm.all;
  return dm[parseInt(cl)] || [];
}

function calcG(risposte) {
  const vals = Object.values(risposte);
  if (!vals.length) return null;
  const m = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (m >= 4.6) return "Ottimo";
  if (m >= 3.8) return "Distinto";
  if (m >= 3.1) return "Buono";
  if (m >= 2.4) return "Discreto";
  if (m >= 1.6) return "Sufficiente";
  return "Non sufficiente";
}

function buildTesto(dom, risposte) {
  if (!dom || !dom.length) return "";
  return dom.map(d => {
    const v = risposte[d.id] || 3;
    return d.frasi ? d.frasi[pi(v)] : "";
  }).filter(Boolean).join(" ");
}

function ml() { return (MATERIE.find(m=>m.id===STATE.materia)||{}).label || ""; }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  const dom = getDom(STATE.materia, STATE.classe);
  const g   = calcG(STATE.risposte);
  const gc  = g ? GC[g] : null;

  let html = `
    <p class="label-top">Strumento docente</p>
    <h1>Valutazione ${ml() || "scuola primaria"}</h1>
    <p class="subtitle">Scrutinio di fine anno · Scuola primaria</p>
    <p style="font-size:12px;color:#999;margin-top:-18px;margin-bottom:28px;font-style:italic">Declinazione traguardi previsti nel PTOF — strumento di prova</p>
  `;

  if (STATE.step === "setup") {
    html += `<label class="section-label">Seleziona la materia</label>
    <div class="grid2">`;
    MATERIE.forEach(m => {
      const sel = STATE.materia === m.id;
      html += `<button class="mat-btn${sel?" selected":""}" onclick="pick('materia','${m.id}')">${m.label}</button>`;
    });
    html += `</div>
    <div class="mb28">
      <label class="section-label">Seleziona la classe</label>
      <select onchange="pick('classe',this.value)">
        <option value="">Seleziona la classe</option>
        ${[['1','Prima'],['2','Seconda'],['3','Terza'],['4','Quarta'],['5','Quinta']].map(([v,n])=>`<option value="${v}"${STATE.classe===v?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-full" ${(!STATE.materia||!STATE.classe)?"disabled":""} onclick="go('info')">Inizia lo scrutinio →</button>`;
  }

  else if (STATE.step === "info") {
    if (STATE.alunni.length) {
      html += `<div class="badge-box" style="background:#f0f0ec">Valutati: <strong>${STATE.alunni.length}</strong> — ${STATE.alunni.map(a=>a.nome).join(", ")}</div>`;
    }
    html += `<p class="step-nome">Nuovo alunno/a — Classe ${STATE.classe}ª — ${ml()}</p>
    <div class="mb24">
      <label class="section-label">Nome</label>
      <input type="text" id="inp-nome" value="${escHtml(STATE.nome)}" placeholder="es. Sofia" oninput="STATE.nome=this.value" onkeydown="if(event.key==='Enter')startDom()">
    </div>
    <div class="flex-row">
      ${STATE.alunni.length ? `<button class="btn" onclick="go('riepilogo')">Fine scrutinio →</button>` : ""}
      <button class="btn btn-flex2" onclick="startDom()">Inizia valutazione →</button>
    </div>`;
  }

  else if (STATE.step === "domande" && dom[STATE.dIdx]) {
    const d = dom[STATE.dIdx];
    html += `<div class="progress">${dom.map((_,i)=>`<div class="progress-seg ${i<STATE.dIdx?"done":i===STATE.dIdx?"current":""}"></div>`).join("")}</div>
    <p class="q-meta">${escHtml(STATE.nome)} · ${d.area} · ${STATE.dIdx+1} di ${dom.length}</p>
    <p class="q-text">${d.t}</p>
    <div class="opt-list">
      ${OPZIONI.map(op=>`<button class="btn" style="text-align:left" onclick="risposta(${op.v})">${op.l}</button>`).join("")}
    </div>
    ${STATE.dIdx > 0 ? `<button class="back-btn" onclick="STATE.dIdx--;render()">← indietro</button>` : ""}`;
  }

  else if (STATE.step === "conferma" && gc) {
    const testo = buildTesto(dom, STATE.risposte);
    html += `
    <div class="giudizio-card" style="background:${gc.bg};border-color:${gc.color}">
      <p class="gj-label" style="color:${gc.color}">Giudizio sintetico · ${ml()}</p>
      <p class="gj-nome" style="color:${gc.color}">${g}</p>
      <p class="gj-sub" style="color:${gc.color}">${escHtml(STATE.nome)} · Classe ${STATE.classe}ª</p>
    </div>
    <div class="barre">
      ${dom.map(dd=>{
        const v = STATE.risposte[dd.id]||0;
        const pct = Math.round((v/5)*100);
        const label = (OPZIONI.find(o=>o.v===v)||{}).l || "";
        return `<div class="barra-row">
          <div class="barra-labels"><span class="area-name">${dd.area}</span><span class="area-val">${label}</span></div>
          <div class="barra-track"><div class="barra-fill" style="width:${pct}%;background:${gc.color}"></div></div>
        </div>`;
      }).join("")}
    </div>
    <div class="testo-box">
      <p class="testo-label">Testo per lo scrutinio</p>
      <p class="testo-content">${escHtml(testo)}</p>
    </div>
    <div class="flex-row">
      <button class="btn btn-flex2" style="background:${gc.bg};color:${gc.color};border-color:${gc.color}" onclick="salva();go('info')">Salva e prossimo →</button>
      <button class="btn" onclick="salva();go('riepilogo')">Fine scrutinio</button>
    </div>`;
  }

  else if (STATE.step === "riepilogo") {
    html += `
    <div class="riepilogo-header">
      <div>
        <p class="riepilogo-title">Scrutinio ${ml()} — Classe ${STATE.classe}ª</p>
        <p class="riepilogo-sub">${STATE.alunni.length} alunni valutati</p>
      </div>
      <button class="btn" onclick="stampaPDF()">Stampa / PDF →</button>
    </div>
    ${STATE.alunni.map((a,i)=>{
      const gc2  = GC[a.giudizio];
      const txt  = buildTesto(dom, a.risposte);
      return `<div class="alunno-card">
        <div class="alunno-top">
          <span class="alunno-nome">${i+1}. ${escHtml(a.nome)}</span>
          <span class="alunno-badge" style="background:${gc2.bg};color:${gc2.color};border-color:${gc2.color}">${a.giudizio}</span>
        </div>
        <p class="alunno-testo">${escHtml(txt)}</p>
      </div>`;
    }).join("")}
    <div class="flex-row" style="margin-top:16px">
      <button class="btn" onclick="go('info')">+ Aggiungi alunno/a</button>
      <button class="btn" onclick="reset()">Nuovo scrutinio</button>
    </div>`;
  }

  app.innerHTML = html;
  if (STATE.step === "info") {
    const inp = document.getElementById("inp-nome");
    if (inp) { inp.focus(); inp.addEventListener("input", ()=>{ STATE.nome=inp.value; }); }
  }
}

// ─── AZIONI ──────────────────────────────────────────────────────────────────
function pick(field, val) { STATE[field] = val; render(); }
function go(step)         { STATE.step = step; render(); }

function startDom() {
  STATE.nome = (document.getElementById("inp-nome")||{}).value || STATE.nome;
  if (!STATE.nome) { alert("Inserisci il nome dell'alunno/a prima di procedere."); return; }
  const domCheck = getDom(STATE.materia, STATE.classe);
  if (!domCheck || !domCheck.length) {
    const nomiClasse = ['','prima','seconda','terza','quarta','quinta'];
    const nomeM = (MATERIE.find(m=>m.id===STATE.materia)||{}).label || STATE.materia;
    alert('La materia ' + nomeM + ' non è prevista per la classe ' + (nomiClasse[parseInt(STATE.classe)]||STATE.classe) + '.');
    return;
  }
  STATE.risposte = {}; STATE.dIdx = 0; STATE.step = "domande"; render();
}

function risposta(v) {
  const dom = getDom(STATE.materia, STATE.classe);
  STATE.risposte[dom[STATE.dIdx].id] = v;
  if (STATE.dIdx < dom.length - 1) { STATE.dIdx++; render(); }
  else { STATE.step = "conferma"; render(); }
}

function salva() {
  STATE.alunni.push({ nome: STATE.nome, giudizio: calcG(STATE.risposte), risposte: {...STATE.risposte} });
  STATE.nome = ""; STATE.risposte = {}; STATE.dIdx = 0;
}

function reset() {
  STATE = { step:"setup", materia:"", classe:"", alunni:[], nome:"", risposte:{}, dIdx:0 };
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function stampaPDF() {
  const dom = getDom(STATE.materia, STATE.classe);
  const label = ml();
  const oggi = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
  let righe = "";
  STATE.alunni.forEach((a,i) => {
    const gc2 = GC[a.giudizio];
    const txt = buildTesto(dom, a.risposte);
    righe += `<tr>
      <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:13px;font-weight:600;vertical-align:top">${i+1}. ${a.nome}</td>
      <td style="padding:10px 12px;border-bottom:1px solid #eee;vertical-align:top"><span style="background:${gc2.bg};color:${gc2.color};border-radius:4px;padding:3px 9px;font-size:12px;font-weight:600">${a.giudizio}</span></td>
      <td style="padding:10px 12px;border-bottom:1px solid #eee;font-size:12px;line-height:1.7;color:#333;vertical-align:top">${txt}</td>
    </tr>`;
  });
  const w = window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Scrutinio ${label}</title>
  <style>@page{margin:2cm}body{font-family:Georgia,serif;color:#222;margin:0}h1{font-size:20px;font-weight:normal;margin:0 0 4px}
  p.sub{font-size:12px;color:#888;margin:0 0 20px}table{width:100%;border-collapse:collapse}
  th{font-size:10px;text-transform:uppercase;color:#aaa;padding:8px 12px;text-align:left;border-bottom:2px solid #ddd}</style>
  </head><body>
  <h1>Scrutinio ${label} — Classe ${['','prima','seconda','terza','quarta','quinta'][parseInt(STATE.classe)]||STATE.classe}</h1>
  <p class="sub">Anno scolastico 2024/25 · ${oggi} · ${STATE.alunni.length} alunni</p>
  <table><thead><tr><th style="width:18%">Alunno/a</th><th style="width:12%">Giudizio</th><th style="width:70%">Descrittori</th></tr></thead>
  <tbody>${righe}</tbody></table></body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

// ─── AVVIO ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
